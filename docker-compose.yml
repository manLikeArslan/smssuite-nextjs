version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smssuite-app
    restart: always
    ports:
      - "3002:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
